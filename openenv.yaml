name: moodmap-passive-mental-health
description: >
  AI agent that analyzes passive behavioral signals (sleep, activity, screen time,
  HRV, social interactions) from smartphones and wearables to assess patient mental
  health risk and recommend appropriate interventions.
version: "1.0.0"

server:
  port: 7860
  health_endpoint: /health

endpoints:
  reset:
    method: POST
    path: /reset
    description: Start a new episode. Scenarios: triage | risk_stratification | early_warning
  step:
    method: POST
    path: /step
    description: Submit agent assessment action
  state:
    method: GET
    path: /state
    description: Current episode metadata
  tasks:
    method: GET
    path: /tasks
    description: List all 3 tasks and action schema
  grader:
    method: GET
    path: /grader
    description: Normalized score 0.0-1.0 (detection + intervention + timeliness)
  baseline:
    method: GET
    path: /baseline
    description: Run median baseline agent on all 3 tasks

tasks:
  - id: triage
    scenario: triage
    max_steps: 5
  - id: risk_stratification
    scenario: risk_stratification
    max_steps: 5
  - id: early_warning
    scenario: early_warning
    max_steps: 5